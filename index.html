<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Royal Inquiry ❤️</title>
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5; 
            background-image: radial-gradient(#d4af37 0.5px, transparent 0.5px), radial-gradient(#d4af37 0.5px, #f5f5f5 0.5px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            font-family: 'Georgia', serif;
            text-align: center;
            overflow: hidden;
            transition: background-color 0.8s ease;
        }

        .container {
            background: #fffdfa;
            padding: 2.5rem;
            border-radius: 5px;
            border: 8px double #d4af37;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 85%;
            max-width: 420px;
            z-index: 1;
            transition: all 0.5s ease;
            position: relative;
        }

        .success-glow {
            animation: bgLightUp 2s infinite alternate;
        }

        @keyframes bgLightUp {
            from { box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-color: #d4af37; }
            to { box-shadow: 0 0 50px rgba(255, 0, 0, 0.3); border-color: #ff0000; }
        }

        .media-style {
            width: 170px;
            height: 170px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #d4af37;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .flower-img {
            width: 100%;
            max-width: 300px;
            height: auto;
            border-radius: 10px;
            border: 2px solid #d4af37;
            display: block;
            margin: 0 auto;
        }

        h1 {
            color: #8b0000;
            font-size: 1.8rem;
            margin: 0 0 1.2rem 0;
            line-height: 1.4;
            font-style: italic;
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 25px;
        }

        button {
            padding: 14px 28px;
            font-size: 1rem;
            border-radius: 4px;
            border: 1px solid #d4af37;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            font-family: 'Georgia', serif;
            text-transform: uppercase;
        }

        #yesBtn {
            background-color: #8b0000;
            color: #f5f5f5;
            position: relative;
            z-index: 100;
        }

        @keyframes glowing {
            0% { box-shadow: 0 0 5px #8b0000; }
            50% { box-shadow: 0 0 25px #ff0000, 0 0 40px #d4af37; }
            100% { box-shadow: 0 0 5px #8b0000; }
        }

        .pulse-glow {
            animation: glowing 1.5s infinite;
        }

        #noBtn {
            background-color: transparent;
            color: #555;
            border: 1px solid #ccc;
        }

        #celebration, #flower-page {
            display: none;
        }

        /* NEW: Wait Wait Animation */
        #wait-wait-text {
            display: none;
            font-size: 1.5rem;
            color: #8b0000;
            font-style: italic;
            margin-top: 15px;
            animation: fadeInOut 2s ease-in-out forwards;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .wait-text {
            font-size: 1.3rem;
            color: #8b0000;
            font-style: italic;
            margin-top: 15px;
        }

        .heart {
            position: fixed;
            bottom: -10px;
            font-size: 20px;
            color: #8b0000;
            user-select: none;
            pointer-events: none;
            z-index: 0;
            animation: floatUp 4s linear forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <!-- Page 1 -->
    <div class="container" id="main-content">
        <div class="img-container">
            <img src="us.jpeg" alt="Our Portrait" class="media-style">
        </div>
        <h1>Devansh, would you do me the honor of being my boyfriend?</h1>
        <div class="buttons">
            <button id="yesBtn" onclick="celebrate()">I Shall</button>
            <button id="noBtn" onclick="makeYesBigger()">Decline</button>
        </div>
    </div>

    <!-- Page 2 -->
    <div id="celebration" class="container">
        <div class="img-container">
            <video id="successVideo" class="media-style" autoplay muted loop playsinline>
                <source src="celebration.mp4" type="video/mp4">
            </video>
        </div>
        <h1>The Ton Shall Hear of This! 🥰 ❤️</h1>
        <div class="wait-text">A most excellent decision, my dear.</div>
        <!-- NEW Animated Wait Line -->
        <div id="wait-wait-text">Wait, wait...</div>
    </div>

    <!-- Page 3 -->
    <div id="flower-page" class="container">
        <img src="flowers.jpeg" alt="Flowers" class="flower-img">
    </div>

    <script>
        let yesSize = 1;
        const messages = ["Are you quite certain?", "Consider your heart...", "Devansh, I implore you...", "A most cruel jest!", "I shall be inconsolable...", "Yield to Yes!"];
        let messageIndex = 0;

        function playMusic() {
            const audio = document.getElementById('bgMusic');
            audio.play().catch(() => {});
        }

        function makeYesBigger() {
            playMusic(); 
            const yesBtn = document.getElementById('yesBtn');
            const noBtn = document.getElementById('noBtn');
            yesBtn.classList.add('pulse-glow');
            yesSize += 0.4;
            yesBtn.style.transform = `scale(${yesSize})`;
            
            if (messageIndex < messages.length) {
                noBtn.innerText = messages[messageIndex];
                messageIndex++;
            } else {
                noBtn.innerText = "Yield to Yes! ❤️";
            }
        }

        function celebrate() {
            playMusic();
            document.getElementById('main-content').style.display = 'none';
            const celebrationContainer = document.getElementById('celebration');
            celebrationContainer.style.display = 'block';
            celebrationContainer.classList.add('success-glow');
            document.body.style.backgroundColor = "#fff0f0"; 
            
            const video = document.getElementById('successVideo');
            video.addEventListener('click', function() {
                video.muted = !video.muted;
                if (!video.muted) video.play();
            });

            startConfetti();

            // At 35 seconds, show "Wait, wait..."
            setTimeout(() => {
                document.getElementById('wait-wait-text').style.display = 'block';
            }, 35000);

            // At 39 seconds, go to flowers
            setTimeout(() => {
                celebrationContainer.style.opacity = '0';
                setTimeout(() => {
                    celebrationContainer.style.display = 'none';
                    const flowerPage = document.getElementById('flower-page');
                    flowerPage.style.display = 'block';
                    flowerPage.classList.add('success-glow');
                    setInterval(createHeart, 300);
                }, 500);
            }, 39000);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's';
            heart.style.fontSize = Math.random() * 20 + 15 + 'px';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }

        function startConfetti() {
            var duration = 39 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0, colors: ['#d4af37', '#8b0000', '#ffffff'] };
            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                confetti(Object.assign({}, defaults, { particleCount: 40, origin: { x: Math.random(), y: Math.random() - 0.2 } }));
            }, 250);
        }
    </script>
</body>
</html>
